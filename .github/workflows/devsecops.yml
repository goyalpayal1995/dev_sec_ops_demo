name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  # ── Job 1: SAST with Bandit ─────────────────────────────
  sast:
    name: Static Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -ll || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Job 2: Build Docker image ────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dev_sec_ops_demo:${{ github.sha }} .

      - name: Save image as artifact
        run: docker save dev_sec_ops_demo:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz

  # ── Job 3: DAST with OWASP ZAP ──────────────────────────
  dast:
    name: Dynamic Analysis (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flask

      - name: Start Flask app in background
        run: |
          python app.py &
          sleep 8
          curl http://localhost:5000 || echo "App not responding"

      - name: Create ZAP output directory
        run: |
          mkdir -p ${{ github.workspace }}/zap-output
          chmod 777 ${{ github.workspace }}/zap-output

      - name: Run ZAP scan and capture results
        run: |
          docker run --network=host \
            -v ${{ github.workspace }}/zap-output:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -r report_html.html \
            -J report_json.json \
            -w report_md.md \
            -I
          echo "ZAP_EXIT_CODE=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Print vulnerability summary in logs
        run: |
          echo "================================================"
          echo "         DAST VULNERABILITY REPORT              "
          echo "================================================"
          cat ${{ github.workspace }}/zap-output/report_md.md || echo "Report not generated"
          echo "================================================"
          echo "ZAP Exit Code: $ZAP_EXIT_CODE"
          echo "0 = No alerts"
          echo "1 = Warnings found"
          echo "2 = Failures found"
          echo "================================================"

      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-results
          path: ${{ github.workspace }}/zap-output/

      - name: Fail pipeline if HIGH vulnerabilities found
        run: |
          echo "ZAP Exit Code was: $ZAP_EXIT_CODE"
          if [ "$ZAP_EXIT_CODE" == "1" ]; then
            echo "❌ HIGH vulnerabilities found - failing pipeline"
            exit 1
          else
            echo "⚠️ Warnings found - check zap-results artifact"
            exit 0
          fi