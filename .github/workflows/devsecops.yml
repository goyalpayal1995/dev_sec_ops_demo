name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: SAST with Bandit ─────────────────────────────
  sast:
    name: Static Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -lll || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Job 2: Build Docker image ───────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dev_sec_ops_demo:${{ github.sha }} .

      - name: Save image as artifact
        run: docker save dev_sec_ops_demo:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz

# ── Job 3: DAST with OWASP ZAP ─────────────────────────
  dast:
    name: Dynamic Analysis (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Start your app in the background
      - name: Set up Python & run app
        run: |
          pip install flask
          python app.py &
          sleep 5   # wait for Flask to start

   # ZAP baseline scan against the running app
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          fail_action: false       # set true to fail on findings
          artifact_name: zap-report

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
