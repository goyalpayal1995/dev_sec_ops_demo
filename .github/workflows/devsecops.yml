name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  # ── Job 1: SAST with Bandit ─────────────────────────────
  sast:
    name: Static Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -ll || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Job 2: Build Docker image ────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dev_sec_ops_demo:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dev_sec_ops_demo:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL 

      - name: Save image as artifact
        run: docker save dev_sec_ops_demo:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz

  # ── Job 3: DAST with OWASP ZAP ──────────────────────────
  dast:
    name: Dynamic Analysis (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flask

      - name: Fix ZAP workspace permissions
        run: chmod 777 ${{ github.workspace }}

      - name: Start Flask app in background
        run: |
          python app.py &
          sleep 8
          curl http://localhost:5000 || echo "App not responding"

      # - name: Get JWT Token
      #   id: auth
      #   run: |
      #     TOKEN=$(curl -s -X POST http://localhost:5000/login \
      #     -H "Content-Type: application/json" \
      #     -d '{"username":"admin","password":"admin"}' | python3 -c "import sys, json; print(json.load(sys.stdin)['token'])")
      #     echo "JWT_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Run OWASP ZAP baseline scan
        continue-on-error: true
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: "http://localhost:5000"
          fail_action: false
          # cmd_options: >
          #   -z "auth.header=Authorization auth.headerValue=Bearer ${{ env.JWT_TOKEN }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          allow_issue_writing: false

      - name: Print vulnerability summary in logs
        if: always()
        run: |
          echo "================================================"
          echo "      DAST VULNERABILITY REPORT - OWASP ZAP    "
          echo "================================================"

          if [ ! -f "report_json.json" ]; then
            echo "❌ No report found"
            exit 0
          fi

          echo ""
          echo "📊 SUMMARY BY SEVERITY"
          echo "------------------------------------------------"
          HIGH=$(cat report_json.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          alerts=[a for s in data.get('site',[]) for a in s.get('alerts',[])]
          print(len([a for a in alerts if a.get('riskdesc','').startswith('High')]))
          ")
          MEDIUM=$(cat report_json.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          alerts=[a for s in data.get('site',[]) for a in s.get('alerts',[])]
          print(len([a for a in alerts if a.get('riskdesc','').startswith('Medium')]))
          ")
          LOW=$(cat report_json.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          alerts=[a for s in data.get('site',[]) for a in s.get('alerts',[])]
          print(len([a for a in alerts if a.get('riskdesc','').startswith('Low')]))
          ")
          INFO=$(cat report_json.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          alerts=[a for s in data.get('site',[]) for a in s.get('alerts',[])]
          print(len([a for a in alerts if a.get('riskdesc','').startswith('Informational')]))
          ")

          echo "🔴 HIGH     : $HIGH"
          echo "🟡 MEDIUM   : $MEDIUM"
          echo "🟢 LOW      : $LOW"
          echo "ℹ️  INFO     : $INFO"
          echo ""

          echo "================================================"
          echo "       DETAILED FINDINGS BY SEVERITY            "
          echo "================================================"

          python3 << 'EOF'
          import json

          with open("report_json.json") as f:
              data = json.load(f)

          alerts = []
          for site in data.get("site", []):
              for alert in site.get("alerts", []):
                  alerts.append(alert)

          risk_order = {"High": 0, "Medium": 1, "Low": 2, "Informational": 3}
          alerts.sort(key=lambda x: risk_order.get(x.get("riskdesc", "").split(" ")[0], 99))

          icons = {
              "High": "🔴",
              "Medium": "🟡",
              "Low": "🟢",
              "Informational": "ℹ️ "
          }

          current_level = None

          for alert in alerts:
              risk = alert.get("riskdesc", "Unknown")
              level = risk.split(" ")[0]
              name = alert.get("name", "Unknown")
              desc = alert.get("desc", "")[:120].replace("\n", " ")
              solution = alert.get("solution", "")[:120].replace("\n", " ")
              instances = alert.get("instances", [])
              cweid = alert.get("cweid", "N/A")
              wascid = alert.get("wascid", "N/A")

              icon = icons.get(level, "⚪")

              if level != current_level:
                  current_level = level
                  print(f"\n{'='*48}")
                  print(f"{icon} {level.upper()} SEVERITY VULNERABILITIES")
                  print(f"{'='*48}")

              print(f"\n  🎯 Attack Type : {name}")
              print(f"  ⚠️  Risk        : {risk}")
              print(f"  🔍 CWE ID      : CWE-{cweid}")
              print(f"  📋 WASC ID     : {wascid}")
              print(f"  📝 Description : {desc}...")
              print(f"  ✅ Solution    : {solution}...")
              print(f"  🌐 Affected URLs:")
              for i in instances[:3]:
                  url = i.get("uri", "")
                  method = i.get("method", "")
                  param = i.get("param", "")
                  attack = i.get("attack", "")
                  evidence = i.get("evidence", "")[:80]
                  print(f"     → [{method}] {url}")
                  if param:
                      print(f"        Param   : {param}")
                  if attack:
                      print(f"        Attack  : {attack}")
                  if evidence:
                      print(f"        Evidence: {evidence}")
              if len(instances) > 3:
                  print(f"     ... and {len(instances)-3} more instances")
              print(f"  {'─'*44}")

          print("\n================================================")
          print("        END OF VULNERABILITY REPORT            ")
          print("================================================")
          EOF

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-results
          path: |
            report_html.html
            report_json.json
            report_md.md